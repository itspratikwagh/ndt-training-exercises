name = "ndt-tutor"
main = "worker.js"
compatibility_date = "2025-01-01"

# Bind a KV namespace called "RL" for rate limiting.
# Create one in the Cloudflare dashboard or with:
#   wrangler kv:namespace create RL
# then paste the id below.
[[kv_namespaces]]
binding = "RL"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secret (do NOT commit). Set with:
#   wrangler secret put ANTHROPIC_API_KEY
# or via the dashboard: Worker → Settings → Variables → Secrets.
