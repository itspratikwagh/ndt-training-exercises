<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiographic Geometry — Ug Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --color-bg:             #ffffff;
    --color-bg-secondary:   #f4f4f5;
    --color-bg-success:     #f0fdf4;
    --color-bg-warning:     #fffbeb;
    --color-bg-danger:      #fef2f2;
    --color-text-primary:   #111827;
    --color-text-secondary: #6b7280;
    --color-text-tertiary:  #9ca3af;
    --color-text-success:   #166534;
    --color-text-warning:   #92400e;
    --color-text-danger:    #991b1b;
    --color-border:         #e5e7eb;
    --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px; color: var(--color-text-primary); background: var(--color-bg);
  }
  body { background: var(--color-bg); }
  .wrap { max-width: 960px; margin: 0 auto; padding: 12px 14px 16px; }

  /* Top bar */
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
  h1 { font-size: 15px; font-weight: 600; }
  .reset-btn {
    font-size: 11px; padding: 4px 11px; border: 1px solid var(--color-border);
    border-radius: var(--radius-md); background: transparent; color: var(--color-text-secondary); cursor: pointer;
  }
  .reset-btn:hover { background: var(--color-bg-secondary); }

  /* ── Main layout: left = canvas+sliders, right = ug+exercises ── */
  .main-row { display: flex; gap: 12px; align-items: stretch; }

  /* LEFT column */
  .left-col { display: flex; flex-direction: column; gap: 8px; flex: 0 0 auto; width: 460px; }

  /* Canvas */
  .canvas-wrap {
    background: #08081a; border-radius: var(--radius-lg);
    overflow: hidden; position: relative; width: 100%;
  }
  canvas { display: block; width: 100%; height: auto; }

  /* Success overlay */
  .canvas-success {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(8,8,26,0.82); border-radius: var(--radius-lg);
  }
  .canvas-success.show { display: flex; }
  .success-card {
    background: #1a1a2e; border-radius: 12px; padding: 18px 22px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    max-width: 280px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    animation: pop .3s cubic-bezier(.36,.07,.19,.97) both;
  }
  .success-icon  { font-size: 36px; }
  .success-title { font-size: 14px; font-weight: 700; color: #fff; text-align: center; }
  .success-sub   { font-size: 11px; color: #aaa; text-align: center; line-height: 1.4; }
  .success-btns  { display: flex; gap: 8px; margin-top: 2px; }
  .success-btn { font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 7px; border: none; cursor: pointer; }
  .success-btn:hover { opacity: 0.85; }
  .success-btn-close { background: #2d2d4a; color: #aaa; }
  .success-btn-next  { background: #e06030; color: #fff; }
  @keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }

  /* Sliders row — horizontal under canvas */
  .sliders-row {
    display: flex; gap: 8px; align-items: stretch;
    background: var(--color-bg-secondary); border-radius: var(--radius-lg);
    padding: 8px 10px;
  }
  .ctrl-row { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .ctrl-label { font-size: 10px; font-weight: 600; color: var(--color-text-secondary); white-space: nowrap; }
  .ctrl-row input[type=range] { width: 100%; accent-color: #e06030; height: 14px; }
  .ctrl-bottom { display: flex; align-items: center; gap: 3px; }
  .ctrl-bottom input[type=number] {
    width: 44px; font-size: 10px; padding: 2px 4px;
    border: 1px solid var(--color-border); border-radius: 5px;
    background: var(--color-bg); color: var(--color-text-primary); -moz-appearance: textfield;
  }
  .ctrl-bottom input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .unit { font-size: 9px; color: var(--color-text-tertiary); }
  .sfd-col {
    display: flex; flex-direction: column; justify-content: center;
    padding-left: 8px; border-left: 1px solid var(--color-border); gap: 2px; flex: 0 0 auto;
  }
  .sfd-label { font-size: 9px; font-weight: 600; color: var(--color-text-secondary); }
  .sfd-val   { font-size: 13px; font-weight: 700; color: var(--color-text-primary); }
  .sfd-sub   { font-size: 9px; color: var(--color-text-tertiary); }

  /* Locked */
  .ctrl-row.locked { opacity: 0.38; pointer-events: none; }
  .ctrl-row.locked .ctrl-label::after { content: " 🔒"; font-size: 8px; }

  /* RIGHT column */
  .right-col { display: flex; flex-direction: column; gap: 8px; flex: 1 1 0; min-width: 0; }

  /* Ug card */
  .ug-card {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    background: var(--color-bg-secondary); border-radius: var(--radius-md); padding: 7px 12px;
  }
  .ug-formula { font-size: 10px; color: var(--color-text-secondary); }
  .ug-value   { font-size: 20px; font-weight: 700; color: #e06030; }
  .ug-badge   { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 500; margin-left: auto; }
  .std-note   { font-size: 9px; color: var(--color-text-tertiary); padding: 0 1px; margin-top: -4px; }

  /* Exercises */
  .exercises { border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; flex: 1; display: flex; flex-direction: column; }
  .ex-tabs   { display: flex; border-bottom: 1px solid var(--color-border); flex-shrink: 0; }
  .ex-tab {
    flex: 1; font-size: 10px; padding: 7px 3px; text-align: center;
    cursor: pointer; color: var(--color-text-secondary);
    background: transparent; border: none; border-bottom: 2px solid transparent;
    transition: all .15s; position: relative;
  }
  .ex-tab.active { color: var(--color-text-primary); border-bottom-color: #e06030; font-weight: 600; }
  .ex-tab.done::after { content: "✓"; position: absolute; top: 3px; right: 5px; font-size: 8px; color: var(--color-text-success); }
  .ex-body { padding: 10px 12px; flex: 1; overflow-y: auto; }
  .ex-title { font-size: 11px; font-weight: 700; margin-bottom: 5px; }

  .ex-steps { font-size: 10px; color: var(--color-text-secondary); line-height: 1.65; list-style: none; padding: 0; margin-bottom: 7px; }
  .ex-steps li { padding-left: 14px; position: relative; }
  .ex-steps li::before { content: "→"; position: absolute; left: 0; color: var(--color-text-tertiary); }

  .target-box {
    background: var(--color-bg-secondary); border-radius: var(--radius-sm);
    padding: 5px 8px; margin-bottom: 6px; border-left: 3px solid #e06030;
  }
  .target-title { font-size: 8px; font-weight: 700; color: #e06030; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
  .target-grid  { display: flex; gap: 8px; flex-wrap: wrap; }
  .target-item  { font-size: 10px; color: var(--color-text-secondary); }
  .target-item strong { color: var(--color-text-primary); }
  .target-item .check { margin-left: 2px; }

  .ex-question {
    font-size: 9px; font-style: italic; color: var(--color-text-secondary);
    margin-bottom: 6px; padding: 5px 8px;
    border-left: 2px solid var(--color-border);
    background: var(--color-bg-secondary); border-radius: 0 4px 4px 0; line-height: 1.4;
  }
  .ex-feedback {
    font-size: 10px; padding: 6px 9px; border-radius: var(--radius-sm);
    line-height: 1.4; margin-bottom: 7px; min-height: 28px; transition: background .25s, color .25s;
  }
  .next-btn {
    font-size: 11px; padding: 5px 14px; border: none; border-radius: var(--radius-md);
    background: #111827; color: #fff; cursor: pointer; font-weight: 600; display: none;
  }
  .next-btn:hover { opacity: 0.82; }
  .next-btn.visible { display: inline-block; }
  .complete-msg {
    font-size: 11px; padding: 9px; border-radius: var(--radius-sm);
    background: var(--color-bg-success); color: var(--color-text-success);
    text-align: center; font-weight: 600; display: none; line-height: 1.4;
  }
  .complete-msg.show { display: block; }

  /* Responsive */
  @media (max-width: 640px) {
    .main-row   { flex-direction: column; }
    .left-col   { width: 100%; }
    .sliders-row { flex-wrap: wrap; }
    .ctrl-row   { flex: 1 1 120px; }
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-bar">
    <h1>Radiographic geometry — Ug explorer</h1>
    <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  </div>

  <div class="main-row">

    <!-- LEFT: canvas + sliders -->
    <div class="left-col">

      <div class="canvas-wrap">
        <canvas id="cvs" width="560" height="360"></canvas>
        <div class="canvas-success" id="canvas-success">
          <div class="success-card">
            <div class="success-icon">✅</div>
            <div class="success-title" id="success-title">Parameters met!</div>
            <div class="success-sub"   id="success-sub"></div>
            <div class="success-btns">
              <button class="success-btn success-btn-close" onclick="hideSuccess()">Close</button>
              <button class="success-btn success-btn-next" id="success-next-btn" onclick="successNext()">Next exercise →</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Sliders horizontal under canvas -->
      <div class="sliders-row">
        <div class="ctrl-row" id="ctrl-row-ss">
          <span class="ctrl-label">SS — source size</span>
          <input type="range" id="sl-ss" min="0.01" max="1" step="0.01" value="0.04"
                 oninput="syncNum('ss',this.value);draw()">
          <div class="ctrl-bottom">
            <input type="number" id="num-ss" min="0.01" max="1" step="0.01" value="0.04"
                   oninput="syncSlider('ss',this.value);draw()">
            <span class="unit">in</span>
          </div>
        </div>
        <div class="ctrl-row" id="ctrl-row-ofd">
          <span class="ctrl-label">OFD — object to film</span>
          <input type="range" id="sl-ofd" min="0.5" max="12" step="0.5" value="3"
                 oninput="syncNum('ofd',this.value);draw()">
          <div class="ctrl-bottom">
            <input type="number" id="num-ofd" min="0.5" max="12" step="0.5" value="3"
                   oninput="syncSlider('ofd',this.value);draw()">
            <span class="unit">in</span>
          </div>
        </div>
        <div class="ctrl-row" id="ctrl-row-sod">
          <span class="ctrl-label">SOD — source to object</span>
          <input type="range" id="sl-sod" min="4" max="60" step="1" value="20"
                 oninput="syncNum('sod',this.value);draw()">
          <div class="ctrl-bottom">
            <input type="number" id="num-sod" min="4" max="60" step="1" value="20"
                   oninput="syncSlider('sod',this.value);draw()">
            <span class="unit">in</span>
          </div>
        </div>
        <div class="sfd-col">
          <span class="sfd-label">SFD</span>
          <span class="sfd-val" id="sfd-val">23.0 in</span>
          <span class="sfd-sub">SOD + OFD</span>
        </div>
      </div>

    </div><!-- /left-col -->

    <!-- RIGHT: Ug readout + exercises -->
    <div class="right-col">

      <div class="ug-card">
        <span class="ug-formula">Ug = SS × OFD / SOD</span>
        <span class="ug-value" id="ug-val">—</span>
        <span class="ug-badge" id="ug-badge">—</span>
      </div>
      <p class="std-note">ASTM E1742 (aerospace): Acceptable ≤ 0.020 in · Marginal 0.020–0.040 in · Unacceptable > 0.040 in</p>

      <div class="exercises">
        <div class="ex-tabs">
          <button class="ex-tab active" id="tab-0" onclick="setEx(0,this)">1. Baseline</button>
          <button class="ex-tab"        id="tab-1" onclick="setEx(1,this)">2. SS</button>
          <button class="ex-tab"        id="tab-2" onclick="setEx(2,this)">3. OFD</button>
          <button class="ex-tab"        id="tab-3" onclick="setEx(3,this)">4. SOD</button>
        </div>
        <div class="ex-body" id="ex-body"></div>
      </div>

    </div><!-- /right-col -->

  </div><!-- /main-row -->
</div><!-- /wrap -->

<script>
/* ── Constants ── */
const CVS_W=560,CVS_H=360,CX=270;
const SLAB_TOP_Y=285,SLAB_H=16;
const FILM_TOP_Y=SLAB_TOP_Y+SLAB_H+4,FILM_H=9;
const OBJ_RX=32,OBJ_RY=10;
const SKX=46,SKY=-18;
const SLAB_LX=66,SLAB_RX=430;
const UMBRA_RX=OBJ_RX,UMBRA_RY=OBJ_RX*0.32;
const UG_ACCEPTABLE=0.020,UG_MARGINAL=0.040;

const cvs=document.getElementById('cvs'),ctx=cvs.getContext('2d');

/* ── Scrambled start values ── */
const scrambles=[
  {ss:0.35,ofd:8,  sod:10},
  {ss:0.12,ofd:3,  sod:20},
  {ss:0.10,ofd:1.5,sod:20},
  {ss:0.40,ofd:3,  sod:10},
];

/* ── Helpers ── */
function v(id){return parseFloat(document.getElementById(id).value)||0}
function syncNum(k,val){document.getElementById('num-'+k).value=parseFloat(val).toFixed(k==='ss'?2:1)}
function syncSlider(k,val){document.getElementById('sl-'+k).value=val}
function setSliders(ss,ofd,sod){
  const vals={ss,ofd,sod};
  ['ss','ofd','sod'].forEach(k=>{
    document.getElementById('sl-'+k).value=vals[k];
    document.getElementById('num-'+k).value=parseFloat(vals[k]).toFixed(k==='ss'?2:1);
  });
}
/* ── State ── */
function getState(){
  const ss=v('sl-ss'),ofd=v('sl-ofd'),sod=v('sl-sod');
  const sfd=+(sod+ofd).toFixed(1),ug=+(ss*ofd/sod).toFixed(4);

  // Fixed vertical zones in SVG space (canvas height = 360):
  //   Source zone : y = 22  (top, SOD max/far) … y = 155 (SOD min/close to object)
  //   Gap padding : 32px minimum between source bottom and object top
  //   Object zone : y = 187 (OFD max/far from film) … y = SLAB_TOP_Y-26 (OFD min/close to film)
  //   Image plane : SLAB_TOP_Y = 285

  const SRC_TOP = 22,  SRC_BOT = 155;   // source travel range
  const OBJ_TOP = 187, OBJ_BOT = SLAB_TOP_Y - 26; // object travel range
  const MIN_GAP = 32;  // minimum px between source and object at all times

  // SOURCE: SOD large → source high (small y), SOD small → source low (large y)
  const srcY = SRC_TOP + (1 - (sod - 4) / (60 - 4)) * (SRC_BOT - SRC_TOP);

  // OBJECT: OFD large → object high (far from film), OFD small → object low (close to film)
  const rawObjY = OBJ_TOP + (1 - (ofd - 0.5) / (12 - 0.5)) * (OBJ_BOT - OBJ_TOP);

  // Hard clamp: object can never be within MIN_GAP of source, never touch slab
  const objY = Math.max(srcY + MIN_GAP, Math.min(rawObjY, SLAB_TOP_Y - 26));

  const extraPx = Math.min(ss * ofd / sod * 240, 140);
  const penRX = UMBRA_RX + extraPx, penRY = penRX * 0.32;
  return { ss, ofd, sod, sfd, ug, objY, srcY, penRX, penRY, extraPx };
}

/* ── Draw helpers ── */
function poly(pts){ctx.beginPath();pts.forEach(([x,y],i)=>i?ctx.lineTo(x,y):ctx.moveTo(x,y));ctx.closePath()}
function slabTop(lx,rx,ty){return[[lx,ty],[rx,ty],[rx+SKX,ty+SKY],[lx+SKX,ty+SKY]]}
function slabFront(lx,rx,ty,h){return[[lx,ty],[rx,ty],[rx,ty+h],[lx,ty+h]]}
function slabRight(rx,ty,h){return[[rx,ty],[rx+SKX,ty+SKY],[rx+SKX,ty+SKY+h],[rx,ty+h]]}
function slabLeft(lx,ty,h){return[[lx,ty],[lx+SKX,ty+SKY],[lx+SKX,ty+SKY+h],[lx,ty+h]]}

/* ── Main draw loop ── */
let animFrame=0,prevDone=false,successShown=false;

function draw(){
  animFrame++;const f=animFrame;
  const{ss,ofd,sod,sfd,ug,objY,srcY,penRX,penRY,extraPx}=getState();
  const slabMidY=SLAB_TOP_Y+SKY*0.5,isPoint=ss<=0.015;
  const sHalf=Math.min(ss*100,100),sL=CX-sHalf,sR=CX+sHalf;
  const t=Date.now()/1000,r1=0.55+0.35*Math.sin(t*2.2),r2=0.4+0.4*Math.sin(t*2.7+0.4);

  ctx.clearRect(0,0,CVS_W,CVS_H);ctx.fillStyle='#08081a';ctx.fillRect(0,0,CVS_W,CVS_H);

  /* Slab */
  poly(slabLeft(SLAB_LX,SLAB_TOP_Y,SLAB_H));ctx.fillStyle='#6a5e20';ctx.fill();
  poly(slabTop(SLAB_LX,SLAB_RX,SLAB_TOP_Y));ctx.fillStyle='#b8a050';ctx.fill();
  ctx.strokeStyle='#cca840';ctx.lineWidth=0.7;ctx.stroke();
  poly(slabFront(SLAB_LX,SLAB_RX,SLAB_TOP_Y,SLAB_H));ctx.fillStyle='#8a6e28';ctx.fill();
  poly(slabRight(SLAB_RX,SLAB_TOP_Y,SLAB_H));ctx.fillStyle='#5e4a18';ctx.fill();

  /* Penumbra */
  if(!isPoint&&extraPx>2){
    ctx.save();ctx.beginPath();ctx.ellipse(CX,slabMidY,penRX,penRY,0,0,Math.PI*2);
    ctx.fillStyle='#b0b0b0';ctx.globalAlpha=0.85;ctx.fill();ctx.restore();
  }
  /* Umbra */
  ctx.beginPath();ctx.ellipse(CX,slabMidY,UMBRA_RX,UMBRA_RY,0,0,Math.PI*2);
  ctx.fillStyle='#151520';ctx.fill();

  /* Shadow labels */
  ctx.font='500 10px sans-serif';ctx.textAlign='center';
  if(isPoint){ctx.fillStyle='#aaaaee';ctx.fillText('sharp shadow',CX,slabMidY+3);}
  else{
    ctx.fillStyle='#aaaaee';ctx.fillText('umbra',CX,slabMidY+3);
    if(extraPx>14){ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.fillText('penumbra',CX,slabMidY-penRY-5);}
  }

  /* Film */
  ctx.fillStyle='#585858';ctx.fillRect(SLAB_LX,FILM_TOP_Y,SLAB_RX-SLAB_LX,FILM_H);
  ctx.fillStyle='#3e3e3e';ctx.fillRect(SLAB_LX,FILM_TOP_Y+FILM_H,SLAB_RX-SLAB_LX,3);

  /* Rays */
  const oL=CX-OBJ_RX,oR=CX+OBJ_RX,pLx=CX-penRX,pRx=CX+penRX;
  function ray(x1,y1,x2,y2,x3,y3,a,col){
    ctx.save();ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=1.1;
    ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    ctx.setLineDash([5,4]);ctx.beginPath();ctx.moveTo(x2,y2);ctx.lineTo(x3,y3);ctx.stroke();
    ctx.setLineDash([]);ctx.restore();
  }
  ray(sL,srcY,oL,objY-OBJ_RY,pLx,SLAB_TOP_Y,r1,'#f5d44e');
  ray(sL,srcY,oR,objY-OBJ_RY,CX+UMBRA_RX,SLAB_TOP_Y,r1,'#f5d44e');
  if(!isPoint){
    ray(sR,srcY,oL,objY-OBJ_RY,CX-UMBRA_RX,SLAB_TOP_Y,r2,'#f5a030');
    ray(sR,srcY,oR,objY-OBJ_RY,pRx,SLAB_TOP_Y,r2,'#f5a030');
  }

  /* Object */
  ctx.beginPath();ctx.ellipse(CX,objY,OBJ_RX,OBJ_RY,0,0,Math.PI*2);ctx.fillStyle='#1a8ec4';ctx.fill();
  ctx.fillStyle='#80d4f5';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.fillText('Object',CX+OBJ_RX+6,objY+4);

  /* Source */
  if(isPoint){ctx.beginPath();ctx.arc(CX,srcY,4,0,Math.PI*2);ctx.fillStyle='#FFD700';ctx.fill();}
  else{
    ctx.fillStyle='#FFD700';ctx.fillRect(sL,srcY-4,sHalf*2,9);
    [sL,sR].forEach(sx=>{
      const g=ctx.createRadialGradient(sx,srcY,0,sx,srcY,12);
      g.addColorStop(0,'rgba(255,215,0,0.22)');g.addColorStop(1,'rgba(255,215,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(sx,srcY,12,0,Math.PI*2);ctx.fill();
    });
  }
  ctx.fillStyle='#FFD700';ctx.font='500 11px sans-serif';ctx.textAlign='center';
  ctx.fillText(isPoint?'Source (point)':`SS = ${ss.toFixed(2)} in`,CX,srcY-12);

  /* Dim lines */
  const dx=38;
  [[srcY,objY,'SOD',sod],[objY,SLAB_TOP_Y,'OFD',ofd]].forEach(([y1,y2,lbl,val])=>{
    ctx.strokeStyle='#555';ctx.lineWidth=0.5;ctx.setLineDash([3,2]);
    ctx.beginPath();ctx.moveTo(dx,y1);ctx.lineTo(dx,y2);ctx.stroke();
    ctx.setLineDash([]);ctx.lineWidth=1;
    [y1,y2].forEach(y=>{ctx.beginPath();ctx.moveTo(dx-3,y);ctx.lineTo(dx+3,y);ctx.stroke();});
    ctx.fillStyle='#777';ctx.font='10px sans-serif';ctx.textAlign='right';
    ctx.fillText(`${lbl}=${val}"`,(dx-5),(y1+y2)/2+4);
  });

  /* Right labels */
  const lblX=SLAB_RX+SKX+7;
  ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillStyle='#b8a050';ctx.fillText('Image plane',lblX,SLAB_TOP_Y+SLAB_H/2+4);
  ctx.fillStyle='#999';ctx.fillText('Film',lblX,FILM_TOP_Y+FILM_H/2+4);
  ctx.fillStyle='#777';ctx.fillText(`SFD=${sfd}"`,lblX,SLAB_TOP_Y-8);

  /* Ug brace */
  if(!isPoint&&extraPx>4){
    const brY=FILM_TOP_Y+FILM_H+12;
    ctx.strokeStyle='#e06030';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(CX-penRX,brY);ctx.lineTo(CX+penRX,brY);ctx.stroke();
    [CX-penRX,CX+penRX].forEach(x=>{ctx.beginPath();ctx.moveTo(x,brY-3);ctx.lineTo(x,brY+3);ctx.stroke();});
    ctx.fillStyle='#e06030';ctx.font='500 10px sans-serif';ctx.textAlign='center';
    ctx.fillText('Uɡ',CX,brY+12);
  }

  /* Readouts */
  document.getElementById('sfd-val').textContent=sfd+' in';
  document.getElementById('ug-val').textContent=isPoint?'≈ 0.0000':ug.toFixed(4)+' in';
  const badge=document.getElementById('ug-badge');
  if(ug<=UG_ACCEPTABLE){badge.textContent='Acceptable';badge.style.cssText='background:var(--color-bg-success);color:var(--color-text-success)';}
  else if(ug<=UG_MARGINAL){badge.textContent='Marginal';badge.style.cssText='background:var(--color-bg-warning);color:var(--color-text-warning)';}
  else{badge.textContent='Unacceptable';badge.style.cssText='background:var(--color-bg-danger);color:var(--color-text-danger)';}

  updateFeedback();
  requestAnimationFrame(()=>{if(animFrame===f)draw();});
}

/* ── Exercises ── */
const exercises=[
  {
    title:'Exercise 1 — Baseline observation',
    activeSliders:['ss','ofd','sod'],
    steps:[
      'Set SS to <strong>0.04 in</strong>',
      'Set OFD to <strong>3 in</strong>',
      'Set SOD to <strong>20 in</strong>',
      'Observe: sharp umbra, minimal penumbra',
    ],
    target:{ss:0.04,ofd:3,sod:20},
    successTitle:'Baseline achieved!',
    successSub:'Ug is well within the ASTM E1742 limit of 0.020 in.',
    question:'Is the shadow sharp or blurry? Is this setup acceptable per ASTM E1742?',
    feedback(done){
      const{ss,ofd,sod,ug}=getState();
      if(done)return{text:`✓ Baseline set. Ug = ${ug.toFixed(4)} in — within the 0.020 in limit. Sharp shadow, minimal penumbra.`,ok:true};
      const h=[];
      if(!exact(ss,0.04,2))h.push(`SS → exactly 0.04 in (now ${ss.toFixed(2)})`);
      if(!exact(ofd,3,1))h.push(`OFD → exactly 3.0 in (now ${ofd.toFixed(1)})`);
      if(!exact(sod,20,0))h.push(`SOD → exactly 20 in (now ${sod})`);
      return{text:'Adjust: '+h.join(' · '),ok:false};
    }
  },
  {
    title:'Exercise 2 — Effect of source size (SS)',
    activeSliders:['ss'],
    steps:[
      'OFD = 3 in and SOD = 20 in are locked',
      'Increase SS to <strong>0.50 in</strong>',
      'Watch the penumbra ring grow outward',
    ],
    target:{ss:0.50,ofd:3,sod:20},
    successTitle:'Correct — large source, large Ug!',
    successSub:'A larger source always increases geometric unsharpness.',
    question:'Does SS = 0.50 in meet ASTM E1742? What would you change to fix it?',
    feedback(done){
      const{ss,ug}=getState();
      if(done)return{text:`✓ Ug = ${ug.toFixed(4)} in — exceeds 0.020 in limit. Fix: reduce SS, reduce OFD, or increase SOD.`,ok:true};
      return{text:`Set SS to exactly 0.50 in (now ${ss.toFixed(2)} in)`,ok:false};
    }
  },
  {
    title:'Exercise 3 — Effect of OFD',
    activeSliders:['ofd'],
    steps:[
      'SS = 0.10 in and SOD = 20 in are locked',
      'Increase OFD to <strong>10 in</strong>',
      'Watch the object move away from the film',
    ],
    target:{ss:0.10,ofd:10,sod:20},
    successTitle:'Correct — high OFD, high Ug!',
    successSub:'Object far from film = more blur. Always minimize OFD.',
    question:'At OFD = 10 in, is this acceptable? How close must the object be to stay within tolerance?',
    feedback(done){
      const{ofd,ug}=getState();
      if(done)return{text:`✓ Ug = ${ug.toFixed(4)} in — exceeds 0.020 in. With SS=0.10 in, SOD=20 in, max OFD = ${(UG_ACCEPTABLE*20/0.10).toFixed(1)} in.`,ok:true};
      return{text:`Set OFD to exactly 10.0 in (now ${ofd.toFixed(1)} in)`,ok:false};
    }
  },
  {
    title:'Exercise 4 — Effect of SOD',
    activeSliders:['sod'],
    steps:[
      'SS = 0.40 in and OFD = 3 in are locked',
      'Increase SOD to <strong>48 in</strong>',
      'Watch the source move up, penumbra shrink',
    ],
    target:{ss:0.40,ofd:3,sod:48},
    successTitle:'Correct — greater SOD, sharper image!',
    successSub:'Even a large source can meet tolerance with enough SOD.',
    question:'At SOD = 48 in with SS = 0.40 in, does this meet ASTM E1742?',
    feedback(done){
      const{sod,ug}=getState();
      const limit=(UG_ACCEPTABLE*sod/3).toFixed(3);
      if(done)return{text:`✓ Ug = ${ug.toFixed(4)} in — ${ug<=UG_ACCEPTABLE?'within':'exceeds'} 0.020 in limit. Max SS at this SOD = ${limit} in.`,ok:true};
      return{text:`Set SOD to exactly 48 in (now ${sod} in)`,ok:false};
    }
  },
];

function exact(val,tgt,decimals){
  // Compare rounded to the same precision as the slider step
  return parseFloat(val.toFixed(decimals))===parseFloat(tgt.toFixed(decimals));
}

/* ── Exercise logic ── */
let curEx=0;
const doneSet=new Set();

function checkDone(){
  const ex=exercises[curEx];const{ss,ofd,sod}=getState();
  return exact(ss,ex.target.ss,2)&&exact(ofd,ex.target.ofd,1)&&exact(sod,ex.target.sod,0);
}

function lockSliders(active){
  ['ss','ofd','sod'].forEach(k=>{
    const row=document.getElementById('ctrl-row-'+k);
    if(!row)return;
    active.includes(k)?row.classList.remove('locked'):row.classList.add('locked');
  });
}

function setEx(i,btn){
  const sc=scrambles[i],ex=exercises[i];
  setSliders(sc.ss,sc.ofd,sc.sod);
  curEx=i;prevDone=false;successShown=false;hideSuccess();
  document.querySelectorAll('.ex-tab').forEach(t=>t.classList.remove('active'));
  (btn||document.getElementById('tab-'+i)).classList.add('active');
  renderEx();lockSliders(ex.activeSliders);draw();
}

function renderEx(){
  const ex=exercises[curEx];
  const steps=ex.steps.map(s=>`<li>${s}</li>`).join('');
  const isLast=curEx===exercises.length-1;
  document.getElementById('ex-body').innerHTML=`
    <div class="ex-title">${ex.title}</div>
    <ul class="ex-steps">${steps}</ul>
    <div class="target-box">
      <div class="target-title">Target values</div>
      <div class="target-grid" id="target-grid"></div>
    </div>
    <div class="ex-question">${ex.question}</div>
    <div class="ex-feedback" id="ex-feedback"></div>
    ${isLast
      ?`<div class="complete-msg" id="complete-msg">🎉 All exercises complete! You can now apply ASTM E1742 aerospace tolerances.</div>`
      :`<button class="next-btn" id="next-btn" onclick="nextEx()">Next exercise →</button>`
    }`;
  updateFeedback();
}

function showSuccess(title,sub){
  const isLast=curEx===exercises.length-1;
  document.getElementById('success-title').textContent=title;
  document.getElementById('success-sub').textContent=sub;
  const nb=document.getElementById('success-next-btn');
  if(nb)nb.style.display=isLast?'none':'';
  document.getElementById('canvas-success').classList.add('show');
}
function hideSuccess(){document.getElementById('canvas-success').classList.remove('show');}
function successNext(){hideSuccess();if(curEx<exercises.length-1){curEx++;setEx(curEx,null);}}

function updateFeedback(){
  const el=document.getElementById('ex-feedback');
  const nb=document.getElementById('next-btn');
  const cm=document.getElementById('complete-msg');
  const tg=document.getElementById('target-grid');
  if(!el)return;
  const ex=exercises[curEx];const{ss,ofd,sod}=getState();
  const isDone=checkDone();
  if(tg){
    const ssOk =exact(ss, ex.target.ss, 2);
    const ofdOk=exact(ofd,ex.target.ofd,1);
    const sodOk=exact(sod,ex.target.sod,0);
    tg.innerHTML=`
      <div class="target-item">SS = <strong>${ex.target.ss.toFixed(2)} in</strong><span class="check">${ssOk?'✅':''}</span></div>
      <div class="target-item">OFD = <strong>${ex.target.ofd.toFixed(1)} in</strong><span class="check">${ofdOk?'✅':''}</span></div>
      <div class="target-item">SOD = <strong>${ex.target.sod} in</strong><span class="check">${sodOk?'✅':''}</span></div>`;
  }
  const{text,ok}=ex.feedback(isDone);
  el.textContent=text;
  el.style.background=ok?'var(--color-bg-success)':'var(--color-bg-secondary)';
  el.style.color=ok?'var(--color-text-success)':'var(--color-text-secondary)';
  if(isDone&&!prevDone&&!successShown){
    successShown=true;showSuccess(ex.successTitle,ex.successSub);
    doneSet.add(curEx);document.getElementById('tab-'+curEx).classList.add('done');
  }
  prevDone=isDone;
  if(isDone){if(nb)nb.classList.add('visible');if(cm)cm.classList.add('show');}
  else{if(nb)nb.classList.remove('visible');if(cm)cm.classList.remove('show');}
}

function nextEx(){if(curEx<exercises.length-1){curEx++;setEx(curEx,null);}}

function resetAll(){
  setSliders(scrambles[0].ss,scrambles[0].ofd,scrambles[0].sod);
  doneSet.clear();prevDone=false;successShown=false;hideSuccess();curEx=0;
  document.querySelectorAll('.ex-tab').forEach((t,i)=>{t.classList.toggle('active',i===0);t.classList.remove('done');});
  renderEx();lockSliders(exercises[0].activeSliders);draw();
}

/* ── Init ── */
setSliders(scrambles[0].ss,scrambles[0].ofd,scrambles[0].sod);
renderEx();lockSliders(exercises[0].activeSliders);draw();
</script>
